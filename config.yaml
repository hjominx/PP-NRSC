# 졸음운전 감지 시스템 설정

# ================================================
# EEG 데이터 소스
# ================================================
eeg_source:
  type: file              # muse2, file, tcp 중 선택
  
  # 파일 소스 예제
  kwargs:
    filepath: test_data.csv
    loop: true            # 반복 재생

  # MUSE2 소스 예제 (주석 제거해서 사용)
  # type: muse2
  # kwargs:
  #   device_name: "Muse"

  # TCP 네트워크 소스 예제 (원격 MUSE2)
  # type: tcp
  # kwargs:
  #   host: "192.168.1.100"
  #   port: 5000

# ================================================
# FastAPI 서버
# ================================================
api:
  url: "http://localhost:8000"    # 서버 주소
  timeout: 5.0                    # 요청 타임아웃 (초)
  apply_minmax: false             # 스트리밍에서는 false 권장

# ================================================
# 점수화 로직 (임계값)
# ================================================
scorer:
  window_size: 30                 # 평활화에 사용할 최근 윈도우 개수
  drowsy_threshold: 0.55          # 이 확률 이상이면 졸음 판정
  instant_alert_threshold: 0.80   # 순간 확률이 이 이상이면 즉시 경고
  accumulated_time_limit: 20.0    # 30초 중 20초 이상 졸음 = 위험

# ================================================
# 경고 설정
# ================================================
alert:
  enabled: true                   # 경고 활성화
  alarm_file: null                # 경고음 파일 경로 (예: /path/to/alarm.wav)
  gpio_pin: null                  # GPIO 진동 모터 핀 번호 (예: 17)
  send_to_server: false           # 원격 서버로 경고 전송
  server_url: null                # 경고 서버 URL (예: https://alert.example.com/incident)

# ================================================
# UI 설정
# ================================================
ui:
  display_type: opencv            # opencv, web, headless 중 선택
  fps: 10                         # UI 갱신 주기 (프레임/초)
  show_stats: true                # 통계 표시 여부

# ================================================
# 디버그 설정
# ================================================
debug: false                       # true면 상세 로그 출력
